<script>
    // Bottom Sheet Logic
    function toggleBottomSheet(open) {
        const sheet = document.getElementById('bottom-sheet');
        const overlay = document.getElementById('sheet-overlay');
        const navMap = document.getElementById('nav-map');
        const navSaved = document.getElementById('nav-saved');

        if (open) {
            sheet.classList.remove('bottom-sheet-closed');
            sheet.classList.add('bottom-sheet-open');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
            
            navSaved.classList.add('text-primary-container', 'dark:text-primary-fixed', 'font-bold', 'bg-secondary-container/20', 'rounded-full', 'px-4', 'py-1');
            navSaved.classList.remove('text-on-surface-variant', 'dark:text-on-surface-variant', 'hover:text-primary', 'dark:hover:text-primary-fixed-dim');
            navSaved.querySelector('span.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
            
            navMap.classList.remove('text-primary-container', 'dark:text-primary-fixed', 'font-bold', 'bg-secondary-container/20', 'rounded-full', 'px-4', 'py-1');
            navMap.classList.add('text-on-surface-variant', 'dark:text-on-surface-variant', 'hover:text-primary', 'dark:hover:text-primary-fixed-dim');
            navMap.querySelector('span.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";

        } else {
            sheet.classList.remove('bottom-sheet-open');
            sheet.classList.add('bottom-sheet-closed');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0', 'pointer-events-none');

            navMap.classList.add('text-primary-container', 'dark:text-primary-fixed', 'font-bold', 'bg-secondary-container/20', 'rounded-full', 'px-4', 'py-1');
            navMap.classList.remove('text-on-surface-variant', 'dark:text-on-surface-variant', 'hover:text-primary', 'dark:hover:text-primary-fixed-dim');
            navMap.querySelector('span.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
            
            navSaved.classList.remove('text-primary-container', 'dark:text-primary-fixed', 'font-bold', 'bg-secondary-container/20', 'rounded-full', 'px-4', 'py-1');
            navSaved.classList.add('text-on-surface-variant', 'dark:text-on-surface-variant', 'hover:text-primary', 'dark:hover:text-primary-fixed-dim');
            navSaved.querySelector('span.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
        }
    }


    // ---- Real Map (Leaflet) ----
    // ---- Offline tile cache (IndexedDB) ----
    // On a shoot with no signal, plain internet tiles won't load. This layer
    // caches every tile it successfully loads into IndexedDB, and serves
    // from that cache first. Practical use: open the app once over WiFi/
    // hotspot before heading to set and pan/zoom through the shots you need
    // — those tiles are then cached on-device and will still show with the
    // phone in airplane mode / no signal.
    const TILE_DB = 'propMapTiles', TILE_STORE = 'tiles';
    function openTileDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(TILE_DB, 1);
            req.onupgradeneeded = () => req.result.createObjectStore(TILE_STORE);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    const OfflineTileLayer = L.TileLayer.extend({
        createTile: function (coords, done) {
            const tile = document.createElement('img');
            tile.setAttribute('role', 'presentation');
            const url = this.getTileUrl(coords);

            const fetchAndCache = () => {
                fetch(url, { mode: 'cors' })
                    .then(r => { if (!r.ok) throw new Error('bad response'); return r.blob(); })
                    .then(blob => new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    }))
                    .then(dataUrl => {
                        tile.src = dataUrl;
                        done(null, tile);
                        openTileDB().then(db => {
                            db.transaction(TILE_STORE, 'readwrite').objectStore(TILE_STORE).put(dataUrl, url);
                        }).catch(() => {});
                    })
                    .catch(() => {
                        // No cache, no network — leave tile blank instead of a broken-image icon
                        tile.onerror = null;
                        done(null, tile);
                    });
            };

            openTileDB().then(db => {
                const getReq = db.transaction(TILE_STORE, 'readonly').objectStore(TILE_STORE).get(url);
                getReq.onsuccess = () => {
                    if (getReq.result) { tile.src = getReq.result; done(null, tile); }
                    else { fetchAndCache(); }
                };
                getReq.onerror = fetchAndCache;
            }).catch(fetchAndCache);

            return tile;
        }
    });

    const OUTPOST_COORDS = [35.12, -115.48]; // Desert Outpost, Middle of Nowhere, NV
    const USER_COORDS = [36.1699, -115.1398]; // Current location — Las Vegas, NV (nearest city, has real streets)

    const map = L.map('leaflet-map', {
        zoomControl: false,
        attributionControl: true,
        center: OUTPOST_COORDS,
        zoom: 12,
        minZoom: 3,
        maxZoom: 19
    });

    // High-res dark basemap (alternate view, matches app theme)
    const darkLayer = new OfflineTileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    });

    // High-res satellite imagery — default. Full global photo coverage, so
    // remote desert/wilderness spots still show real terrain instead of an
    // empty black tile (which is what the sparse OSM data gave us here).
    const satelliteLayer = new OfflineTileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri',
        maxZoom: 19
    }).addTo(map);

    let isSatellite = true;
    function toggleMapLayer() {
        if (isSatellite) {
            map.removeLayer(satelliteLayer);
            darkLayer.addTo(map);
        } else {
            map.removeLayer(darkLayer);
            satelliteLayer.addTo(map);
        }
        isSatellite = !isSatellite;
    }

    // Blue/Cyan Dot: Desert Outpost (Wilderness)
    const outpostIcon = L.divIcon({
        className: '',
        html: '<div class="w-6 h-6 bg-secondary-container rounded-full pulse-glow border-2 border-[#111415]"></div>',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
    });
    const outpostMarker = L.marker(OUTPOST_COORDS, { icon: outpostIcon }).addTo(map);
    outpostMarker.bindTooltip(
        `<span class="font-mono-data text-mono-data">LAT ${OUTPOST_COORDS[0].toFixed(2)} · LON ${OUTPOST_COORDS[1].toFixed(2)}</span>`,
        { direction: 'bottom', offset: [0, 14], className: 'coord-tooltip' }
    );

    // Green Dot: Current Location (added to map on demand)
    const userIcon = L.divIcon({
        className: '',
        html: '<div class="w-4 h-4 bg-green-400 rounded-full pulse-glow-green border-2 border-[#111415]" style="box-shadow: rgba(74, 222, 128, 0.4) 0px 0px 8px 3px; animation: 2s ease 0s infinite normal none running pulse-green-refined;"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });
    let userMarker = null;

    function locateMyself() {
        map.flyTo(USER_COORDS, 14, { duration: 1.5 });
        if (!userMarker) {
            userMarker = L.marker(USER_COORDS, { icon: userIcon }).addTo(map);
            userMarker.bindTooltip(
                '<span class="font-mono-data text-mono-data user-tooltip">CURRENT LOC</span>',
                { permanent: true, direction: 'top', offset: [0, -12], className: 'coord-tooltip user-tooltip' }
            );
        }
    }

    function doMapPan() {
        map.flyTo(OUTPOST_COORDS, 15, { duration: 1.5 });
        setTimeout(() => {
            outpostMarker.openTooltip();
        }, 800);
    }

    function jumpToOutpost() {
        toggleBottomSheet(false);
        setTimeout(doMapPan, 300);
    }

    function jumpToOutpostDesktop() {
        setTimeout(doMapPan, 50);
    }

    // Leaflet needs a resize nudge once its container has its final layout size
    window.addEventListener('load', () => setTimeout(() => map.invalidateSize(), 100));
    window.addEventListener('resize', () => map.invalidateSize());
</script>
</body></html>
